<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a4ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#00a4ef" opacity="0.3"/>
  <circle cx="1100" cy="700" r="100" fill="#50e6ff" opacity="0.2"/>
  <circle cx="600" cy="400" r="150" fill="#0078d4" opacity="0.1"/>
  
  <!-- Title -->
  <text x="600" y="120" font-size="64" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
    Azure Data Engineering
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="180" font-size="24" text-anchor="middle" fill="#e0f2ff" font-family="Arial, sans-serif">
    End-to-End Pipeline Architecture
  </text>
  
  <!-- Architecture diagram -->
  <!-- Bronze Layer -->
  <rect x="80" y="280" width="140" height="100" fill="white" opacity="0.95" rx="8"/>
  <text x="150" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
    Bronze
  </text>
  <text x="150" y="335" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Raw CSV
  </text>
  <text x="150" y="355" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Data
  </text>
  
  <!-- Arrow 1 -->
  <line x1="220" y1="330" x2="280" y2="330" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- ADF -->
  <rect x="280" y="280" width="140" height="100" fill="white" opacity="0.95" rx="8"/>
  <text x="350" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
    Data
  </text>
  <text x="350" y="335" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Factory
  </text>
  <text x="350" y="355" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    (ADF)
  </text>
  
  <!-- Arrow 2 -->
  <line x1="420" y1="330" x2="480" y2="330" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- ADLS Gen2 -->
  <rect x="480" y="280" width="140" height="100" fill="white" opacity="0.95" rx="8"/>
  <text x="550" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
    ADLS
  </text>
  <text x="550" y="335" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Gen2
  </text>
  <text x="550" y="355" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Storage
  </text>
  
  <!-- Arrow 3 -->
  <line x1="620" y1="330" x2="680" y2="330" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Databricks -->
  <rect x="680" y="280" width="140" height="100" fill="white" opacity="0.95" rx="8"/>
  <text x="750" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
    Databricks
  </text>
  <text x="750" y="335" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    (PySpark)
  </text>
  <text x="750" y="355" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
  </text>
  
  <!-- Arrow 4 -->
  <line x1="820" y1="330" x2="880" y2="330" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Analytics -->
  <rect x="880" y="280" width="140" height="100" fill="white" opacity="0.95" rx="8"/>
  <text x="950" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
    Gold
  </text>
  <text x="950" y="335" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Analytics
  </text>
  <text x="950" y="355" font-size="12" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">
    Ready
  </text>
  
  <!-- Lower section - Key Features -->
  <g id="features">
    <rect x="100" y="480" width="280" height="140" fill="white" opacity="0.95" rx="8"/>
    <text x="240" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
      Technologies
    </text>
    <text x="120" y="540" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Azure Data Factory
    </text>
    <text x="120" y="565" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Azure Databricks
    </text>
    <text x="120" y="590" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • PySpark & Parquet
    </text>
    
    <rect x="460" y="480" width="280" height="140" fill="white" opacity="0.95" rx="8"/>
    <text x="600" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
      Architecture
    </text>
    <text x="480" y="540" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Layered Data Lake
    </text>
    <text x="480" y="565" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Batch & Incremental
    </text>
    <text x="480" y="590" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Delta Lake MERGE
    </text>
    
    <rect x="820" y="480" width="280" height="140" fill="white" opacity="0.95" rx="8"/>
    <text x="960" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#0078d4" font-family="Arial, sans-serif">
      Key Features
    </text>
    <text x="840" y="540" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Data Quality & Schema
    </text>
    <text x="840" y="565" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Watermark Processing
    </text>
    <text x="840" y="590" font-size="13" fill="#333" font-family="Arial, sans-serif">
      • Production-Ready
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" />
    </marker>
  </defs>
</svg>